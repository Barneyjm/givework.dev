name = "givework"
main = "src/worker.ts"

# nodejs_compat is required for the `pg` driver (Cloudflare's recommended
# Postgres driver). A compatibility date >= 2025-04-01 also turns on
# nodejs_compat_populate_process_env, which copies Worker secrets/vars onto
# process.env — so src/db.ts and src/auth.ts read process.env unchanged.
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Custom domains for this Worker. custom_domain=true makes Cloudflare provision
# the proxied DNS record AND the edge TLS cert automatically — no manual DNS, no
# *.workers.dev. One Worker serves both hostnames:
#   givework.dev      — the marketing site (./site assets) + API fall-through
#   api.givework.dev  — the canonical API address volunteers point runners at
# Both must be on this Cloudflare account's zone. If the apex is currently served
# some other way (e.g. Pages), drop the first line so this deploy doesn't adopt it.
routes = [
  { pattern = "givework.dev", custom_domain = true },
  { pattern = "api.givework.dev", custom_domain = true },
]

# Secrets (set once per environment, NOT committed):
#   wrangler secret put DATABASE_URL          # Neon POOLED url, e.g. postgres://...-pooler.../givework
#   wrangler secret put JWT_SECRET            # long random value
#   wrangler secret put GITHUB_CLIENT_ID      # GitHub OAuth app client id (self-serve dev sign-in)
#   wrangler secret put GITHUB_CLIENT_SECRET  # GitHub OAuth app client secret
#   wrangler secret put OAUTH_REDIRECT_URI    # https://api.givework.dev/auth/github/callback
#                                             # Pin this to the canonical API host so it always matches the
#                                             # callback URL registered on the GitHub OAuth app. (If unset it
#                                             # defaults to the request origin, which varies by hostname.)
#
# These are also what the GitHub Actions deploy expects to already exist on the
# Worker. `wrangler deploy` does not set secrets; set them out-of-band the first
# time (locally or via the dashboard), then deploys reuse them.

# Hyperdrive pools + caches connections to Neon on Cloudflare's edge, so the
# per-request connection in src/db.ts is cheap. The config points at Neon's
# DIRECT url (Hyperdrive does its own pooling). db.ts reads
# env.HYPERDRIVE.connectionString and falls back to the DATABASE_URL secret.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "4654b8779705462c84ca7e02440c8da6"

[observability]
enabled = true

# Outbound transactional email via Cloudflare Email Sending (the domain
# givework.dev is onboarded there, so SPF/DKIM are aligned). The Worker sends the
# intake confirmation + completion notifications through this binding
# (src/mailer.ts). Sends from an address on the onboarded domain to any recipient.
[[send_email]]
name = "SEND_EMAIL"

# Inbound nonprofit intake arrives as email, not HTTP. The Worker's `email`
# handler (src/worker.ts → src/intake/email.ts) is invoked by Cloudflare Email
# Routing. Wiring is a one-time dashboard/DNS step, NOT configured in this file:
#   1. Zone → Email → Email Routing: enable it (adds the MX + SPF records).
#   2. Add custom address `intake@givework.dev`, action "Send to a Worker" →
#      this Worker (givework).
#   3. (recommended) Route `hello@givework.dev` to your real inbox for first
#      contact / onboarding — that address is intentionally NOT the Worker.
# Only mail from an allowlisted (verified) nonprofit is processed; everything
# else is rejected at SMTP time. See src/intake/email.ts for the security model.

# Serve the static landing page from this same Worker. A request that matches a
# file in ./site (i.e. `/` -> index.html) is served directly as an asset; anything
# that doesn't match falls through to the Worker — so the API routes (/budget,
# /checkout, /release, /submit, /tasks/open, /auth/*, /devs/*, /admin/*) keep
# working.
# Default not_found_handling keeps non-asset paths going to the Worker (no SPA mode).
# Local preview: `npm run cf:dev` (wrangler dev) serves these assets like prod;
# `npm run dev` (raw Node) runs the API only and does NOT serve the landing page.
[assets]
directory = "./site"
# Default html_handling serves status.html at the clean, extensionless path
# /status, so the status link is givework.dev/status?task_id=<id> (a query-param
# page — uncrawled, and the page itself is noindex).
