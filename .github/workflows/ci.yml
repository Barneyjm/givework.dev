name: CI

# Test database strategy:
# CI runs against the throwaway Postgres service container below — fast, isolated,
# torn down with the job. For integration testing against *real* Neon, create an
# ephemeral Neon branch on demand and delete it after (branches are cheap and
# created/deleted in seconds):
#   neonctl branches create --name ci-$GITHUB_RUN_ID --parent main   # returns a connection string
#   DATABASE_URL=<branch-url> TEST_DB_ALLOW_REMOTE=1 npm test
#   neonctl branches delete ci-$GITHUB_RUN_ID
# Never point the suite at a shared/prod branch: resetDb() TRUNCATEs every table
# (test/helpers.ts guards against non-local URLs unless TEST_DB_ALLOW_REMOTE=1).

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: givework
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the job runs.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/givework
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply migrations
        run: npm run migrate
      - name: Run tests
        run: npm test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
